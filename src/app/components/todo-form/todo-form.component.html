<form class="todo-form" [formGroup]="todoForm" (ngSubmit)="onSubmit()">
  <label>
    <input class="todo-form-input" formControlName="todoName" placeholder="Type task name" required="">
  </label>
  <button type="submit" class="todo-form-button" [disabled]="!todoForm.valid">
    <span>Add ToDo</span>
  </button>
</form>
